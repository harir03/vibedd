version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./backend:/app
      - /app/models/trained
      - /app/data/power_curves
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "13000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:18000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
